<!doctype html>
<html xmlns:th="https://thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Wolf Sistema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">

        <div class="container-fluid">

            <a href="/administrativo"><img src="https://i.pinimg.com/736x/8a/47/9e/8a479e6bf2e4f138e942fddd8b6c25c3.jpg" class="icon" alt="Imagem" width="40" height="40" style="margin-right: 10px;"></a>

            <a class="navbar-brand" href="/administrativo">Wolf Sistema</a>

            <button class="navbar-toggler" type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#conteudoNavbarSuportado"
                    aria-controls="conteudoNavbarSuportado"
                    aria-expanded="false"
                    aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="conteudoNavbarSuportado">

                <ul class="navbar-nav me-auto mb-2 mb-lg-0">

                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="/administrativo">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">Link</a>
                    </li>

                </ul>

                <form class="d-flex" role="search">
                    <input class="form-control me-2" type="search"
                        placeholder="Pesquisar" aria-label="Pesquisar">
                    <button class="btn btn-outline-light" type="submit">
                        Pesquisar
                    </button>
                </form>

            </div>
        </div>
    </nav>

    <div class="container">
        <form action="/salvarVenda" th:object="${venda}" method="POST">
            <div class="form-group">
                <div class="row" th:object="${itemVenda}">
                    <div class="col-6">
                        <label class="form-label">Produtos: </label>
                        <select th:field="*{produto}" class="form-control">
                            <option th:each="est : ${listaProdutos}" th:value="${est.id}" th:text="${est.nome}"></option>
                        </select>
                    </div>
                    <div class="col">
                        <label class="form-label">Quantidade: </label>
                        <input type="number" required class="form-control" id="quantidade" th:field="*{quantidade}">
                    </div>
<!--                    <div class="col">-->
<!--                        <label class="form-label">Valor de Custo: </label>-->
<!--                        <input type="number" required class="form-control" id="subtotal" th:field="*{subtotal}">-->
<!--                    </div>-->
<!--                    <div class="col">-->
<!--                        <label class="form-label">Valor de Venda: </label>-->
<!--                        <input type="number" required class="form-control" id="valor" th:field="*{valor}">-->
<!--                    </div>-->
                    <div class="col">
                        <button name="acao" th:value="itens" style="margin-top: 32px" type="submit" class="btn btn-primary"><i class="fa-solid fa-cart-plus"></i> Adicionar</button>
                    </div>
                </div>

                <div class="row">
                    <div class="col-4">
                        <label for="id" class="form-label">ID: </label>
                        <input type="text" readonly="true" class="form-control" id="id" th:field="*{id}">

                        <label class="form-label">Observação: </label>
                        <input type="text" class="form-control" id="obs" th:field="*{obs}">

                        <label class="form-label">Funcionário: </label>
                        <select th:field="*{funcionario}" class="form-control">
                            <option th:each="est : ${listaFuncionarios}" th:value="${est.id}" th:text="${est.nome}"></option>
                        </select>

                        <label class="form-label">Clientes: </label>
                        <select th:field="*{cliente}" class="form-control">
                            <option th:each="est : ${listaClientes}" th:value="${est.id}" th:text="${est.nome}"></option>
                        </select>

                        <label class="form-label">Valor Total: </label>
                        <input type="number" required class="form-control" id="valorTotal" th:field="*{valorTotal}">

                        <label class="form-label">Quantidade Total: </label>
                        <input type="number" required class="form-control" id="quantidadeTotal" th:field="*{quantidadeTotal}">

                        <button type="submit" formnovalidate name="acao" th:value="salvar" class="btn btn-primary"><i class="fa-solid fa-floppy-disk"></i>Salvar</button>
                        <a href="/administrativo" class="btn btn-danger"><i class="fa-solid fa-arrow-left"></i> Voltar</a>
                        <a href="/listarVenda" class="btn btn-success"><i class="fa-solid fa-list"></i> Listar</a>
                    </div>
                    <div class="col">
                        <table class="table table-striped" id="tabela" style="margin-top: 27px">
                            <thead>
                                <tr>
                                    <th scope="col" class="bg-primary text-white">ID</th>
                                    <th scope="col" class="bg-primary text-white">Produto</th>
                                    <th scope="col" class="bg-primary text-white">Quantidade</th>
                                    <th scope="col" class="bg-primary text-white">Valor Unitário</th>
                                    <th scope="col" class="bg-primary text-white">Subtotal</th>
                                    <th scope="col" class="bg-primary text-white">Ação</th>
                                </tr>
                            </thead>

                            <tbody>
                                <tr th:each="ItemVenda : ${listaItemVenda}">
                                    <th th:text="${ItemVenda.id}" scope="row"></th>
                                    <td th:text="${ItemVenda.produto.nome}"></td>
                                    <td th:text="${ItemVenda.quantidade}"></td>
                                    <td th:text="${ItemVenda.subtotal}"></td>
                                    <td th:text="${ItemVenda.valor}"></td>
                                    <td>
                                        <a th:href="@{/editarItemVenda/{id}(id=${ItemVenda.id})}"><i class="fa-solid fa-pen-to-square"></i></a>
                                        <a th:href="@{/removerItemVenda/{id}(id=${ItemVenda.id})}"><i class="fa-solid fa-xmark"></i></a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </form>
    </div>

    <div class="container" style="margin-top: 10px">

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
    <script>
        $(document).ready(function() {
            console.log("jQuery carregado com sucesso!");
            $('#cep').mask('00000-000');
        });
    </script>
</body>
</html>
