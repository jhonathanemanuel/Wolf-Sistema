<!doctype html>
<html xmlns:th="https://thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Wolf Sistema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!--  Usando jquery aqui  -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">

        <div class="container-fluid">

            <a href="/administrativo"><img src="https://i.pinimg.com/736x/8a/47/9e/8a479e6bf2e4f138e942fddd8b6c25c3.jpg" class="icon" alt="Imagem" width="40" height="40" style="margin-right: 10px;"></a>

            <a class="navbar-brand" href="/administrativo">Wolf Sistema</a>

            <button class="navbar-toggler" type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#conteudoNavbarSuportado"
                    aria-controls="conteudoNavbarSuportado"
                    aria-expanded="false"
                    aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="conteudoNavbarSuportado">

                <ul class="navbar-nav me-auto mb-2 mb-lg-0">

                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="/administrativo">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">Link</a>
                    </li>

                </ul>

                <form class="d-flex" role="search">
                    <input class="form-control me-2" type="search"
                           placeholder="Pesquisar" aria-label="Pesquisar">
                    <button class="btn btn-outline-light" type="submit">
                        Pesquisar
                    </button>
                </form>

            </div>
        </div>
    </nav>


    <div class="container" style="border: 1px solid lightgray; border-radius: 10px; margin-top: 10px">
        <table class="table" id="tabela">
            <thead>
                <tr>
                    <th scope="col">ID</th>
                    <th scope="col">Nome Cliente</th>
                    <th scope="col">Nome Funcionário</th>
                    <th scope="col">Data Venda</th>
                    <th scope="col">Valor Total</th>
                    <th scope="col">Opções</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="venda : ${listaVendas}">
                    <th th:text="${venda.id}" scope="row"></th>
                    <td th:text="${venda.cliente.nome}"></td>
                    <td th:text="${venda.funcionario.nome}"></td>
                    <td th:text="${venda.dataVenda}"></td>
                    <td th:text="${venda.valorTotal}"></td>
                    <td>
                        <a th:href="@{/editarVenda/{id}(id=${venda.id})}"><i class="fa-solid fa-pen-to-square"></i></a>
                        <a th:href="@{/removerVenda/{id}(id=${venda.id})}"><i class="fa-solid fa-xmark"></i></a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="container" style="margin-top: 4px; margin-left: 50px">
        <a href="/administrativo" class="btn btn-danger"><i class="fa-solid fa-arrow-left"></i> Voltar</a>
        <a href="/cadastroVenda" class="btn btn-primary"><i class="fa-solid fa-plus"></i> Cadastrar</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <!--  Usando jquery aqui  -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>

    <script>
        $(document).ready(function() {
            $('#tabela').DataTable({
                "language": {
                    "url": "https://cdn.datatables.net/plug-ins/1.13.7/i18n/pt-BR.json"
                }
            });
        });
    </script>
</body>
</html>
