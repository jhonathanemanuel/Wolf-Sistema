<!doctype html>
<html xmlns:th="https://thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Wolf Sistema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">

        <div class="container-fluid">

            <a href="/administrativo"><img src="https://i.pinimg.com/736x/8a/47/9e/8a479e6bf2e4f138e942fddd8b6c25c3.jpg" class="icon" alt="Imagem" width="40" height="40" style="margin-right: 10px;"></a>

            <a class="navbar-brand" href="/administrativo">Wolf Sistema</a>

            <button class="navbar-toggler" type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#conteudoNavbarSuportado"
                    aria-controls="conteudoNavbarSuportado"
                    aria-expanded="false"
                    aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="conteudoNavbarSuportado">

                <ul class="navbar-nav me-auto mb-2 mb-lg-0">

                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="/administrativo">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">Link</a>
                    </li>

                </ul>

                <form class="d-flex" role="search">
                    <input class="form-control me-2" type="search"
                        placeholder="Pesquisar" aria-label="Pesquisar">
                    <button class="btn btn-outline-light" type="submit">
                        Pesquisar
                    </button>
                </form>

            </div>
        </div>
    </nav>


    <div class="container">
        <form action="/salvarEstado" th:object="${estado}" method="POST">
            <div class="mb-3">
                <label for="id" class="form-label">ID: </label>
                <input type="text" readonly="true" class="form-control" id="id" th:field="*{id}">
                <label for="nome" class="form-label">Nome Estado: </label>
                <input type="text" required class="form-control" id="nome" th:field="*{nome}">
                <label for="sigla" class="form-label">Sigla: </label>
                <input type="text" required class="form-control" id="sigla" th:field="*{sigla}">
            </div>

            <button type="submit" class="btn btn-primary"><i class="fa-solid fa-floppy-disk"></i> Salvar</button>
            <a href="/administrativo" class="btn btn-danger"><i class="fa-solid fa-arrow-left"></i> Voltar</a>
            <a href="/listarEstado" class="btn btn-success"><i class="fa-solid fa-list"></i> Listar</a>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
